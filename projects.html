<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผลงาน — D Compose Architect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&family=Noto+Sans+Thai+Looped:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="assets/icon/logo/logo.jpg">
    <style>
        /* ─────────────────────────────────────
           PAGE BANNER
        ───────────────────────────────────── */
        .page-banner {
            padding: 8rem var(--sp-margin) var(--sp-xl);
            display: flex; flex-direction: column;
            align-items: center; gap: var(--sp-md);
        }
        .page-banner h1 {
            font-weight: 600; font-size: var(--fs-h1);
            line-height: var(--lh-h1); letter-spacing: var(--ls-h1);
            text-align: center;
        }
        .page-banner-sub {
            font-weight: 700; font-size: var(--fs-label);
            line-height: var(--lh-label); letter-spacing: var(--ls-label);
            text-align: center;
        }
        .page-banner-sub-mobile { display: none; }

        /* ─────────────────────────────────────
           PROJECTS SECTION
        ───────────────────────────────────── */
        .projects {
            padding: 0 var(--sp-margin) var(--sp-xl);
            display: flex; flex-direction: column; gap: var(--sp-md);
        }
        .proj-header {
            display: flex; align-items: center; justify-content: space-between;
        }
        .projects-grid {
            display: grid; grid-template-columns: repeat(12, 1fr); gap: var(--sp-gap);
        }
        .proj-card { grid-column: span 6; }

        /* ─────────────────────────────────────
           TABLET  (769px – 1023px)
        ───────────────────────────────────── */
        @media (min-width: 769px) and (max-width: 1023px) {
            .page-banner { padding: 6rem var(--sp-margin) var(--sp-md); }
        }

        /* ─────────────────────────────────────
           MOBILE  (≤ 768px)
        ───────────────────────────────────── */
        @media (max-width: 768px) {
            .page-banner { padding: var(--sp-xxxl) var(--sp-margin) var(--sp-md); align-items: flex-start; gap: var(--sp-sm); margin-top: var(--sp-md); }
            .page-banner h1 { font-size: 2.5rem; line-height: 2.75rem; letter-spacing: -0.0625rem; text-align: left; }
            .page-banner-sub { display: none; }
            .eyebrow {order: 1;}
            .projects { gap: var(--sp-gap);}
            .projects-grid { grid-template-columns: 1fr; }
            .proj-card { grid-column: 1; }
            .proj-header { flex-direction: column; align-items: flex-start; gap: var(--sp-xl); }
            .btn-text { display: none;}
        }
    </style>
</head>
<body>
<div class="page-overlay"></div>
